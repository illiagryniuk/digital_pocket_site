<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Clipboard</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #171a20;
      --muted: #596273;
      --accent: #225de8;
      --border: #d9deea;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111318;
        --card: #1a1d24;
        --text: #f5f7fb;
        --muted: #b5bdcb;
        --accent: #7aa2ff;
        --border: #303644;
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Pocket Clipboard</h1>
      <p>Pocket Clipboard is an iOS app for saving copied text, selected file items, and pictures locally on your device.</p>
      <div class="links">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./support.html">Support</a>
      </div>
    </div>
  </div>
</body>
</html>
